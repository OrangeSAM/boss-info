<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD采集助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>JD采集助手 - 设置</h1>
      <p class="subtitle">配置AI服务和分析需求</p>
    </header>

    <!-- Tab 导航 -->
    <nav class="tabs">
      <button type="button" class="tab-btn active" data-tab="api">API 配置</button>
      <button type="button" class="tab-btn" data-tab="prompt">分析设置</button>
    </nav>

    <form id="settingsForm" class="form">
      <!-- Tab 1: API 配置 -->
      <div class="tab-panel active" data-tab="api">
        <div class="form-group">
          <label for="apiEndpoint">API地址</label>
          <input type="url" id="apiEndpoint" name="apiEndpoint" placeholder="https://api.xiaomimimo.com/anthropic/v1/messages" required>
          <p class="hint">支持 Anthropic 和 OpenAI 格式的 API</p>
        </div>

        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-with-btn">
            <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." required autocomplete="off">
            <button type="button" id="testBtn" class="btn btn-test">检测</button>
          </div>
        </div>

        <div class="form-group">
          <label for="model">模型名称</label>
          <input type="text" id="model" name="model" placeholder="mimo-v2.5" required>
        </div>
      </div>

      <!-- Tab 2: 分析设置 -->
      <div class="tab-panel" data-tab="prompt">
        <div class="section">
          <h2 class="section-title">岗位方向</h2>
          <div class="form-group">
            <label for="jobType">我的岗位方向</label>
            <select id="jobType" name="jobType">
              <option value="frontend">前端开发</option>
              <option value="backend">后端开发</option>
              <option value="fullstack">全栈开发</option>
              <option value="mobile">移动端开发</option>
              <option value="ai">AI/算法</option>
              <option value="product">产品经理</option>
              <option value="test">测试</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">重点关注</h2>
          <div class="form-group">
            <div class="checkbox-group">
              <label class="checkbox">
                <input type="checkbox" name="focus" value="tech_stack" checked>
                <span>技术栈详情</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="interview" checked>
                <span>面试准备</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="salary" checked>
                <span>薪资分析</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="business">
                <span>业务分析</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="team">
                <span>团队评估</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="risk">
                <span>风险提示</span>
              </label>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">自定义需求</h2>
          <div class="form-group">
            <label for="customRequirements">其他分析需求（可选）</label>
            <textarea id="customRequirements" name="customRequirements" rows="3" placeholder="例如：我想了解这家公司的前端团队规模、技术氛围、是否使用微前端等"></textarea>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">Prompt 预览</h2>
          <div class="prompt-preview" id="promptPreview">
            <pre id="promptContent"></pre>
          </div>
          <button type="button" id="togglePrompt" class="btn btn-outline btn-small">展开/收起</button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存设置</button>
      </div>
    </form>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
