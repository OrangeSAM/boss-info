<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD采集助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>JD采集助手 - 设置</h1>
      <p class="subtitle">配置AI服务和分析需求</p>
    </header>

    <!-- Tab 导航 -->
    <nav class="tabs">
      <button type="button" class="tab-btn active" data-tab="data">已采集数据</button>
      <button type="button" class="tab-btn" data-tab="api">API 配置</button>
      <button type="button" class="tab-btn" data-tab="prompt">分析设置</button>
    </nav>

    <!-- Tab 0: 已采集数据 -->
    <div class="tab-panel active" data-tab="data">
      <div class="data-header">
        <div class="data-info">
          <span id="dataCompany" class="data-company">未采集</span>
          <span id="dataCount" class="data-count">共 0 个岗位</span>
        </div>
        <button type="button" id="clearDataBtn" class="btn btn-danger btn-small">清空数据</button>
      </div>

      <div id="jobList" class="job-list">
        <div class="empty-state" id="emptyState">
          <p>暂无数据</p>
          <p class="hint">请在BOSS直聘公司招聘岗位页点击插件采集</p>
        </div>
        <div id="jobListItems" class="job-list-items"></div>
      </div>

      <div class="data-actions">
        <button type="button" id="analyzeBtn" class="btn btn-primary" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
          </svg>
          AI 分析
        </button>
        <button type="button" id="exportReportBtn" class="btn btn-outline" disabled>导出报告</button>
        <button type="button" id="exportRawBtn" class="btn btn-outline" disabled>导出原始数据</button>
      </div>

      <div id="analysisResult" class="analysis-result hidden">
        <h3>分析结果</h3>
        <div id="analysisContent" class="analysis-content"></div>
      </div>
    </div>

    <!-- Tab 1: API 配置 -->
    <div class="tab-panel" data-tab="api">
      <form id="settingsForm" class="form">
        <div class="form-group">
          <label for="apiEndpoint">API地址</label>
          <input type="url" id="apiEndpoint" name="apiEndpoint" placeholder="https://api.xiaomimimo.com/anthropic/v1/messages" required>
          <p class="hint">支持 Anthropic 和 OpenAI 格式的 API</p>
        </div>

        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-with-btn">
            <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." required autocomplete="off">
            <button type="button" id="testBtn" class="btn btn-test">检测</button>
          </div>
        </div>

        <div class="form-group">
          <label for="model">模型名称</label>
          <input type="text" id="model" name="model" placeholder="mimo-v2.5" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存设置</button>
        </div>
      </form>
    </div>

    <!-- Tab 2: 分析设置 -->
    <div class="tab-panel" data-tab="prompt">
      <form id="promptForm" class="form">
        <div class="section">
          <h2 class="section-title">岗位方向</h2>
          <div class="form-group">
            <label for="jobType">我的岗位方向</label>
            <select id="jobType" name="jobType">
              <option value="frontend">前端开发</option>
              <option value="backend">后端开发</option>
              <option value="fullstack">全栈开发</option>
              <option value="mobile">移动端开发</option>
              <option value="ai">AI/算法</option>
              <option value="product">产品经理</option>
              <option value="test">测试</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">重点关注</h2>
          <div class="form-group">
            <div class="checkbox-group">
              <label class="checkbox">
                <input type="checkbox" name="focus" value="tech_stack" checked>
                <span>技术栈详情</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="interview" checked>
                <span>面试准备</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="salary" checked>
                <span>薪资分析</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="business">
                <span>业务分析</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="team">
                <span>团队评估</span>
              </label>
              <label class="checkbox">
                <input type="checkbox" name="focus" value="risk">
                <span>风险提示</span>
              </label>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">自定义需求</h2>
          <div class="form-group">
            <label for="customRequirements">其他分析需求（可选）</label>
            <textarea id="customRequirements" name="customRequirements" rows="3" placeholder="例如：我想了解这家公司的前端团队规模、技术氛围、是否使用微前端等"></textarea>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">Prompt 预览</h2>
          <div class="prompt-preview" id="promptPreview">
            <pre id="promptContent"></pre>
          </div>
          <button type="button" id="togglePrompt" class="btn btn-outline btn-small">展开/收起</button>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存设置</button>
        </div>
      </form>
    </div>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
