<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD采集助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div></div>
        <h1>JD采集助手</h1>
        <button type="button" id="themeToggle" class="theme-toggle" title="切换主题">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <p class="subtitle">配置AI服务和分析需求</p>
    </header>

    <!-- Tab 导航 -->
    <nav class="tabs">
      <button type="button" class="tab-btn active" data-tab="data">已采集数据</button>
      <button type="button" class="tab-btn" data-tab="report">分析报告</button>
      <button type="button" class="tab-btn" data-tab="api">API 配置</button>
      <button type="button" class="tab-btn" data-tab="prompt">分析设置</button>
    </nav>

    <!-- Tab 0: 已采集数据 -->
    <div class="tab-panel active" data-tab="data">
      <div class="split-layout">
        <!-- 左侧：公司列表 -->
        <div class="split-list">
          <div class="split-list-header">
            <h3>已采集公司</h3>
          </div>
          <div id="companyList" class="split-list-items">
            <div class="empty-state" id="companyListEmpty">
              <p>暂无数据</p>
              <p class="hint">请在BOSS直聘采集</p>
            </div>
          </div>
        </div>
        <!-- 右侧：公司详情 -->
        <div class="split-detail">
          <div id="companyEmpty" class="empty-state">
            <p>选择一家公司查看详情</p>
          </div>
          <div id="companyDetail" class="hidden">
            <div class="data-header">
              <div class="data-info">
                <span id="dataCompany" class="data-company"></span>
                <span id="dataCount" class="data-count"></span>
              </div>
              <button type="button" id="deleteCompanyBtn" class="btn btn-danger btn-small">删除公司</button>
            </div>

            <div id="jobList" class="job-list">
              <div id="jobListItems" class="job-list-items"></div>
            </div>

            <div class="data-actions">
              <button type="button" id="analyzeBtn" class="btn btn-primary" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
                AI 分析
              </button>
              <button type="button" id="exportReportBtn" class="btn btn-outline" disabled>导出报告</button>
              <button type="button" id="exportRawBtn" class="btn btn-outline" disabled>导出原始数据</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab 1: 分析报告 -->
    <div class="tab-panel" data-tab="report">
      <div id="reportEmpty" class="empty-state">
        <p>暂无分析报告</p>
        <p class="hint">请先在"已采集数据"中选择公司并进行 AI 分析</p>
      </div>
      <div id="reportContent" class="hidden">
        <div class="report-header">
          <span id="reportCompany" class="report-company"></span>
          <button type="button" id="exportReportBtn2" class="btn btn-outline btn-small">导出报告</button>
        </div>
        <div id="reportBody" class="report-body analysis-content"></div>
      </div>
    </div>

    <!-- Tab 2: API 配置 -->
    <div class="tab-panel" data-tab="api">
      <div class="split-layout">
        <!-- 左侧：Provider 列表 -->
        <div class="split-list">
          <div class="split-list-header">
            <h3>Provider</h3>
            <button type="button" id="addProviderBtn" class="btn-add">+ 添加</button>
          </div>
          <div id="providerList" class="split-list-items"></div>
        </div>
        <!-- 右侧：Provider 详情 -->
        <div class="split-detail">
          <div id="providerEmpty" class="empty-state">
            <p>暂无 Provider</p>
            <p class="hint">点击"添加"创建一个 API Provider</p>
          </div>
          <form id="settingsForm" class="form hidden">
            <div class="form-group">
              <label for="providerName">名称</label>
              <input type="text" id="providerName" name="providerName" placeholder="例如：小米MiMo" required>
            </div>
            <div class="form-group">
              <label for="apiEndpoint">API地址</label>
              <input type="url" id="apiEndpoint" name="apiEndpoint" placeholder="https://api.xiaomimimo.com/anthropic/v1/messages" required>
              <p class="hint">支持 Anthropic 和 OpenAI 格式的 API</p>
            </div>
            <div class="form-group">
              <label for="apiKey">API Key</label>
              <div class="input-with-btn">
                <input type="password" id="apiKey" name="apiKey" placeholder="sk-..." required autocomplete="off">
                <button type="button" id="testBtn" class="btn btn-test">检测</button>
              </div>
            </div>
            <div class="form-group">
              <label for="model">模型名称</label>
              <input type="text" id="model" name="model" placeholder="mimo-v2.5" required>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存</button>
              <button type="button" id="deleteProviderBtn" class="btn btn-danger">删除</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Tab 3: 分析设置 -->
    <div class="tab-panel" data-tab="prompt">
      <form id="promptForm" class="form">
        <div class="prompt-editor">
          <!-- 左侧：配置区 -->
          <div class="prompt-config">
            <div class="section">
              <h2 class="section-title">岗位方向</h2>
              <div class="form-group">
                <label for="jobType">我的岗位方向</label>
                <select id="jobType" name="jobType">
                  <option value="frontend">前端开发</option>
                  <option value="backend">后端开发</option>
                  <option value="fullstack">全栈开发</option>
                  <option value="mobile">移动端开发</option>
                  <option value="ai">AI/算法</option>
                  <option value="product">产品经理</option>
                  <option value="test">测试</option>
                  <option value="other">其他</option>
                </select>
              </div>
            </div>

            <div class="section">
              <h2 class="section-title">重点关注</h2>
              <div class="form-group">
                <div class="checkbox-group">
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="tech_stack" checked>
                    <span>技术栈详情</span>
                  </label>
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="interview" checked>
                    <span>面试准备</span>
                  </label>
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="salary" checked>
                    <span>薪资分析</span>
                  </label>
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="business">
                    <span>业务分析</span>
                  </label>
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="team">
                    <span>团队评估</span>
                  </label>
                  <label class="checkbox">
                    <input type="checkbox" name="focus" value="risk">
                    <span>风险提示</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="section">
              <h2 class="section-title">自定义需求</h2>
              <div class="form-group">
                <label for="customRequirements">其他分析需求（可选）</label>
                <textarea id="customRequirements" name="customRequirements" rows="3" placeholder="例如：我想了解这家公司的前端团队规模、技术氛围、是否使用微前端等"></textarea>
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">保存设置</button>
            </div>
          </div>

          <!-- 右侧：预览区 -->
          <div class="prompt-preview-panel">
            <h2 class="section-title">Prompt 预览</h2>
            <div class="prompt-preview">
              <pre id="promptContent"></pre>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="marked.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
